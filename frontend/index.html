<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <script src="config.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 650px;
      margin: 60px auto;
      padding: 0 20px;
      background: #f5f5f5;
      color: #333;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    p.subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: #444;
    }

    input[type="url"], input[type="text"], input[type="password"], input[type="email"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }

    button.secondary {
      background: white;
      color: #2563eb;
      border: 1px solid #2563eb;
    }
    button.secondary:hover { background: #eff6ff; }

    button.danger {
      background: white;
      color: #dc2626;
      border: 1px solid #dc2626;
      padding: 6px 12px;
      font-size: 13px;
    }
    button.danger:hover { background: #fef2f2; }

    #result-box {
      display: none;
      margin-top: 14px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 6px;
      padding: 12px;
      font-size: 14px;
    }

    #result-box a {
      color: #16a34a;
      font-weight: bold;
      word-break: break-all;
    }

    .link-item {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .link-item:last-child { border-bottom: none; }

    .link-info a {
      font-size: 15px;
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }

    .link-info a:hover { text-decoration: underline; }

    .link-info .long-url {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 380px;
    }

    .click-count {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }

    #nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    #user-info {
      font-size: 13px;
      color: #666;
    }

    #user-info span {
      color: #2563eb;
      font-weight: bold;
    }

    .msg { font-size: 13px; color: #888; padding: 12px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="nav">
  <h1>URL Shortener</h1>
  <div id="user-info" class="hidden">
    Signed in as <span id="user-email"></span>
    &nbsp;
    <button class="secondary" onclick="signOut()" style="padding:6px 12px;font-size:13px">Sign out</button>
  </div>
</div>

<p class="subtitle">Shorten long URLs and track how many times they get clicked.</p>

<!-- Auth gate -->
<div id="auth-gate">
  <div class="card">
    <h2>Sign in to get started</h2>
    <button onclick="signIn()">Sign in / Sign up</button>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">

  <!-- Create link -->
  <div class="card">
    <h2>Create a short link</h2>
    <input type="url" id="long-url-input" placeholder="https://example.com/your-long-url" />
    <button id="btn-shorten" onclick="shortenUrl()">Shorten</button>
    <div id="result-box">
      Short link: <a id="short-url-display" href="#" target="_blank"></a>
      &nbsp;
      <button class="secondary" onclick="copyLink()" style="padding:5px 10px;font-size:13px">Copy</button>
    </div>
  </div>

  <!-- My links -->
  <div class="card">
    <h2 style="display:flex;justify-content:space-between;align-items:center">
      My links
      <button class="secondary" onclick="loadLinks()" style="padding:5px 12px;font-size:13px">Refresh</button>
    </h2>
    <div id="links-list"><p class="msg">Loading...</p></div>
  </div>

</div>

<script>
  const API    = CONFIG.API_BASE_URL;
  const CLIENT = CONFIG.COGNITO_CLIENT_ID;
  const DOMAIN = CONFIG.COGNITO_DOMAIN;
  const REDIRECT = CONFIG.REDIRECT_URI;

  let idToken = null;
  let userEmail = null;
  let lastShortUrl = null;

  function signIn() {
    const params = new URLSearchParams({
      response_type: "code",
      client_id: CLIENT,
      redirect_uri: REDIRECT,
      scope: "openid email profile",
    });
    window.location.href = `https://${DOMAIN}/login?${params}`;
  }

  function signOut() {
    idToken = null;
    userEmail = null;
    localStorage.removeItem("tokens");
    const params = new URLSearchParams({ client_id: CLIENT, logout_uri: REDIRECT });
    window.location.href = `https://${DOMAIN}/logout?${params}`;
  }

  async function exchangeCode(code) {
    const body = new URLSearchParams({
      grant_type: "authorization_code",
      client_id: CLIENT,
      redirect_uri: REDIRECT,
      code,
    });
    const res = await fetch(`https://${DOMAIN}/oauth2/token`, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body,
    });
    if (!res.ok) throw new Error("Token exchange failed");
    return res.json();
  }

  function parseJwt(token) {
    try {
      return JSON.parse(atob(token.split(".")[1].replace(/-/g,"+").replace(/_/g,"/")));
    } catch { return null; }
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      try {
        const tokens = await exchangeCode(code);
        localStorage.setItem("tokens", JSON.stringify(tokens));
        window.history.replaceState({}, "", window.location.pathname);
      } catch(e) { console.error(e); }
    }

    const stored = localStorage.getItem("tokens");
    if (!stored) return showLoggedOut();

    const tokens = JSON.parse(stored);
    const payload = parseJwt(tokens.id_token);
    if (!payload) return showLoggedOut();

    const now = Math.floor(Date.now() / 1000);
    if (payload.exp < now) return showLoggedOut();

    idToken = tokens.id_token;
    userEmail = payload.email || "";
    showLoggedIn();
  }

  function showLoggedIn() {
    document.getElementById("auth-gate").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("user-info").classList.remove("hidden");
    document.getElementById("user-email").textContent = userEmail;
    loadLinks();
  }

  function showLoggedOut() {
    document.getElementById("auth-gate").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
    document.getElementById("user-info").classList.add("hidden");
  }

  async function apiFetch(path, options = {}) {
    const headers = {
      "Content-Type": "application/json",
      "Authorization": idToken,
      ...(options.headers || {}),
    };
    return fetch(`${API}${path}`, { ...options, headers });
  }

  async function shortenUrl() {
    const input = document.getElementById("long-url-input");
    const btn   = document.getElementById("btn-shorten");
    const longUrl = input.value.trim();
    if (!longUrl) { alert("Please enter a URL"); return; }

    btn.disabled = true;
    btn.textContent = "Shortening...";

    try {
      const res  = await apiFetch("/links", { method: "POST", body: JSON.stringify({ long_url: longUrl }) });
      const data = await res.json();

      if (!res.ok) { alert(data.error || "Something went wrong"); return; }

      lastShortUrl = data.short_url;
      const box = document.getElementById("result-box");
      const link = document.getElementById("short-url-display");
      link.href = data.short_url;
      link.textContent = data.short_url;
      box.style.display = "block";
      input.value = "";
      loadLinks();
    } catch(e) {
      alert("Request failed");
    } finally {
      btn.disabled = false;
      btn.textContent = "Shorten";
    }
  }

  function copyLink() {
    if (!lastShortUrl) return;
    navigator.clipboard.writeText(lastShortUrl).then(() => alert("Copied!"));
  }

  async function loadLinks() {
    const container = document.getElementById("links-list");
    container.innerHTML = "<p class='msg'>Loading...</p>";

    try {
      const res  = await apiFetch("/links");
      const data = await res.json();
      const links = (data.links || []).sort((a, b) => b.created_at - a.created_at);

      if (links.length === 0) {
        container.innerHTML = "<p class='msg'>No links yet. Create one above!</p>";
        return;
      }

      container.innerHTML = "";
      links.forEach(link => {
        const shortUrl = `${API}/r/${link.code}`;
        const item = document.createElement("div");
        item.className = "link-item";
        item.id = `link-${link.code}`;
        item.innerHTML = `
          <div class="link-info">
            <a href="${shortUrl}" target="_blank">/${link.code}</a>
            <div class="long-url">${link.long_url}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="click-count">${link.click_count} click${link.click_count !== 1 ? "s" : ""}</span>
            <button class="danger" onclick="deleteLink('${link.code}', this)">Delete</button>
          </div>`;
        container.appendChild(item);
      });
    } catch(e) {
      container.innerHTML = "<p class='msg' style='color:red'>Failed to load links.</p>";
    }
  }

  async function deleteLink(code, btn) {
    btn.disabled = true;
    btn.textContent = "...";
    try {
      const res = await apiFetch(`/links/${code}`, { method: "DELETE" });
      if (res.ok) {
        document.getElementById(`link-${code}`).remove();
        const container = document.getElementById("links-list");
        if (container.children.length === 0) {
          container.innerHTML = "<p class='msg'>No links yet. Create one above!</p>";
        }
      } else {
        alert("Could not delete link");
        btn.disabled = false;
        btn.textContent = "Delete";
      }
    } catch {
      alert("Request failed");
      btn.disabled = false;
      btn.textContent = "Delete";
    }
  }

  document.getElementById("long-url-input").addEventListener("keydown", e => {
    if (e.key === "Enter") shortenUrl();
  });

  init();
</script>
</body>
</html>
